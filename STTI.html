<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STTI 股票投资人格测试</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #0f0a0a;
    --bg2: #1a1111;
    --card: #1e1414;
    --card-border: #3f2a2a;
    --fg: #f0e8e8;
    --fg-muted: #9f8a8a;
    --accent: #ff5252;
    --accent2: #ff8a80;
    --accent-dim: #4a1010;
    --danger: #00e676;
    --danger-dim: #1b5e20;
    --gold: #ffd740;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 背景装饰 - 简化，无动画 */
  .bg-decor {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .bg-decor .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.12;
  }
  .bg-decor .orb1 {
    width: 400px; height: 400px;
    background: var(--accent);
    top: -100px; left: -80px;
  }
  .bg-decor .orb2 {
    width: 350px; height: 350px;
    background: var(--accent2);
    bottom: -80px; right: -60px;
  }
  .bg-decor .orb3 {
    display: none;
  }

  /* 网格背景 */
  .bg-grid {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      linear-gradient(rgba(255,82,82,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,82,82,0.02) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  /* 主容器 */
  .app {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  /* 页面通用 */
  .page {
    width: 100%;
    max-width: 640px;
    display: none;
    flex-direction: column;
    align-items: center;
  }
  .page.active {
    display: flex;
  }

  /* ========== 开始页 ========== */
  .start-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
  }
  .start-page .logo-icon {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-dim), #3d1010);
    border: 3px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    color: var(--accent);
    margin-bottom: 32px;
    box-shadow: 0 0 50px rgba(255,82,82,0.2);
  }
  .start-page .subtitle {
    color: var(--fg);
    font-size: 20px;
    margin-bottom: 12px;
    text-align: center;
    line-height: 1.6;
    font-weight: 500;
  }
  .start-page .subtitle small {
    display: block;
    font-size: 14px;
    color: var(--fg-muted);
    margin-top: 8px;
    font-weight: normal;
  }
  .start-page .features {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    width: 100%;
    margin: 32px 0 48px 0;
  }
  .start-page .feat-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 24px 16px;
    text-align: center;
  }
  .feat-card i {
    font-size: 28px;
    color: var(--accent);
    margin-bottom: 12px;
    display: block;
  }
  .feat-card span {
    font-size: 14px;
    color: var(--fg-muted);
    line-height: 1.5;
    display: block;
  }

  /* 按钮 */
  .btn-primary {
    background: linear-gradient(135deg, var(--accent-dim), #3d1010);
    border: 2px solid var(--accent);
    color: var(--accent);
    font-family: 'ZCOOL QingKe HuangYou', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    padding: 16px 56px;
    border-radius: 60px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .btn-primary:hover {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 30px rgba(255,82,82,0.3);
    transform: translateY(-2px);
  }
  .btn-primary:active { transform: translateY(0); }

  /* ========== 答题页 ========== */
  .quiz-container {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* 进度区域 */
  .progress-area {
    width: 100%;
    margin-bottom: 32px;
  }
  .progress-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .progress-top .q-count {
    font-size: 14px;
    color: var(--fg-muted);
  }
  .progress-top .q-count b {
    color: var(--accent);
    font-size: 18px;
  }
  .progress-top .dim-label {
    font-size: 12px;
    color: #000;
    background: rgba(255,255,255,0.9);
    padding: 4px 8px;
    min-width: 68px;
    text-align: center;
    border-radius: 20px;
    border: 1px solid rgba(0,0,0,0.1);
  }
  .progress-bar-bg {
    width: 100%;
    height: 6px;
    background: var(--card);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 10px rgba(0,230,118,0.4);
  }

  /* 题目卡片 */
  .question-card {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 32px 28px;
  }
  .question-card .q-text {
    font-size: 18px;
    font-weight: 500;
    line-height: 1.7;
    margin-bottom: 28px;
    min-height: 60px;
  }

  /* 选项 */
  .options { display: flex; flex-direction: column; gap: 12px; }
  .option-btn {
    width: 100%;
    text-align: left;
    background: rgba(0,230,118,0.04);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 16px 20px;
    color: var(--fg);
    font-size: 15px;
    line-height: 1.6;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .option-btn .opt-letter {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 8px;
    background: rgba(0,230,118,0.08);
    border: 1px solid rgba(0,230,118,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
    color: var(--accent);
    transition: all 0.25s ease;
  }
  .option-btn:hover {
    border-color: var(--accent);
    background: rgba(0,230,118,0.08);
    transform: translateX(4px);
  }
  .option-btn:hover .opt-letter {
    background: var(--accent);
    color: var(--bg);
  }
  .option-btn.selected {
    border-color: var(--accent);
    background: rgba(0,230,118,0.12);
  }
  .option-btn.selected .opt-letter {
    background: var(--accent);
    color: var(--bg);
  }

  /* ========== 结果页 ========== */
  .result-container {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .result-header {
    text-align: center;
    margin-bottom: 8px;
  }
  .result-header .tag {
    display: inline-block;
    font-size: 12px;
    color: var(--accent);
    background: rgba(0,230,118,0.08);
    border: 1px solid rgba(0,230,118,0.2);
    padding: 4px 16px;
    border-radius: 20px;
    margin-bottom: 16px;
    letter-spacing: 2px;
  }
  .result-header .type-code {
    font-family: 'ZCOOL QingKe HuangYou', sans-serif;
    font-size: 56px;
    letter-spacing: 4px;
    background: linear-gradient(90deg, #ff5252, #ff8a80, #ff5252);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .result-header .type-name {
    font-size: 24px;
    font-weight: 700;
    color: var(--fg);
    margin-bottom: 4px;
  }
  .result-header .match-pct {
    font-size: 14px;
    color: var(--fg-muted);
  }
  .result-header .match-pct b {
    color: var(--accent);
    font-size: 20px;
  }

  /* 维度图 */
  .dim-radar {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 24px;
  }
  .dim-radar h3 {
    font-size: 14px;
    color: var(--fg-muted);
    margin-bottom: 18px;
    letter-spacing: 1px;
  }
  .dim-bars { display: flex; flex-direction: column; gap: 10px; }
  .dim-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .dim-label {
    width: 70px;
    font-size: 12px;
    color: var(--fg-muted);
    text-align: right;
    flex-shrink: 0;
  }
  .dim-bar-bg {
    flex: 1;
    height: 8px;
    background: rgba(0,230,118,0.08);
    border-radius: 4px;
    overflow: hidden;
  }
  .dim-bar-fill {
    height: 100%;
    border-radius: 4px;
  }
  .dim-bar-fill.L { background: var(--danger); }
  .dim-bar-fill.M { background: var(--gold); }
  .dim-bar-fill.H { background: var(--accent); }
  .dim-level {
    width: 24px;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .dim-level.L { color: var(--danger); }
  .dim-level.M { color: var(--gold); }
  .dim-level.H { color: var(--accent); }

  /* 特点描述 */
  .desc-card {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 24px 28px;
  }
  .desc-card h3 {
    font-size: 14px;
    color: var(--fg-muted);
    margin-bottom: 14px;
    letter-spacing: 1px;
  }
  .desc-card p {
    font-size: 15px;
    line-height: 1.8;
    color: var(--fg);
  }
  .desc-card .traits {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }
  .desc-card .trait-tag {
    font-size: 12px;
    padding: 4px 14px;
    border-radius: 20px;
    border: 1px solid var(--card-border);
    color: var(--fg-muted);
    background: rgba(0,230,118,0.04);
  }

  /* 维度分组 */
  .dim-group-title {
    font-size: 11px;
    color: var(--accent-dim);
    letter-spacing: 2px;
    padding: 8px 0 4px 0;
    border-bottom: 1px solid rgba(0,230,118,0.06);
    margin-top: 6px;
  }

  .btn-secondary {
    background: transparent;
    border: 2px solid var(--card-border);
    color: var(--fg-muted);
    font-family: 'ZCOOL QingKe HuangYou', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    padding: 14px 44px;
    border-radius: 60px;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 12px;
  }
  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,230,118,0.04);
  }


  /* Toast 提示 */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: var(--card);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 12px 28px;
    border-radius: 12px;
    font-size: 14px;
    z-index: 100;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* 响应式 */
  @media (max-width: 480px) {
    .start-page .subtitle { font-size: 18px; }
    .start-page .features { grid-template-columns: 1fr; gap: 8px; }
    .feat-card { padding: 14px 10px; }
    .question-card { padding: 24px 20px; }
    .question-card .q-text { font-size: 16px; }
    .result-header .type-code { font-size: 40px; }
    .dim-label { width: 56px; font-size: 11px; }
  }

  /* 减少动画偏好 */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }


</style>
</head>
<body>

<div class="bg-decor">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>
<div class="bg-grid"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<div class="app">

  <!-- ===== 开始页 ===== -->
  <div class="page active" id="startPage">
    <div class="start-page">
      <div class="logo-icon">
        <i class="fas fa-chart-line"></i>
      </div>
      <p class="subtitle">
        STTI股票投资人格测试
        <small>30道题，测出你在股市中的真实人格</small>
      </p>
      <div class="features">
        <div class="feat-card">
          <i class="fas fa-layer-group"></i>
          <span>15个维度</span>
        </div>
        <div class="feat-card">
          <i class="fas fa-fingerprint"></i>
          <span>28种股民人格</span>
        </div>
        <div class="feat-card">
          <i class="fas fa-dice"></i>
          <span>隐藏彩蛋<br>等你触发</span>
        </div>
      </div>
      <button class="btn-primary" onclick="startQuiz()" aria-label="开始测试">
        开始测试
      </button>
    </div>
  </div>

  <!-- ===== 答题页 ===== -->
  <div class="page" id="quizPage">
    <div class="quiz-container">
      <div class="progress-area">
        <div class="progress-top">
          <span class="q-count">第 <b id="qCurrent">1</b> / <b id="qTotal">30</b> 题</span>
          <span class="dim-label" id="dimLabel">风险承受力</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>
      <div class="question-card" id="questionCard">
        <div class="q-text" id="qText">题目文字</div>
        <div class="options" id="optionsContainer"></div>
      </div>
    </div>
  </div>

  <!-- ===== 结果页 ===== -->
  <div class="page" id="resultPage">
    <div class="result-container">
      <div class="result-header">
        <div class="tag">你的股民人格</div>
        <div class="type-code" id="resCode">GOD</div>
        <div class="type-name" id="resName">股神</div>
        <div class="match-pct">匹配度 <b id="resMatch">95</b>%</div>
      </div>

      <div class="dim-radar">
        <h3><i class="fas fa-chart-bar" style="margin-right:6px;"></i>维度分析</h3>
        <div class="dim-bars" id="dimBars"></div>
      </div>

      <div class="desc-card">
        <h3><i class="fas fa-scroll" style="margin-right:6px;"></i>人格解读</h3>
        <p id="resDesc">描述文字</p>
        <div class="traits" id="resTraits"></div>
      </div>

      <button class="btn-secondary" onclick="restartQuiz()">
        <i class="fas fa-redo" style="margin-right:8px;"></i>重新测试
      </button>
    </div>
  </div>

</div>

<script>
// ===== 题目数据 =====
const DIMENSIONS = [
  { key: 'R1', name: '风险承受力', group: '风险模型' },
  { key: 'R2', name: '波动容忍度', group: '风险模型' },
  { key: 'R3', name: '止损果断度', group: '风险模型' },
  { key: 'L1', name: '基本面信仰', group: '逻辑模型' },
  { key: 'L2', name: '技术面依赖', group: '逻辑模型' },
  { key: 'L3', name: '消息面敏感', group: '逻辑模型' },
  { key: 'E1', name: '贪婪指数',   group: '情绪模型' },
  { key: 'E2', name: '恐慌指数',   group: '情绪模型' },
  { key: 'E3', name: '错失恐惧',   group: '情绪模型' },
  { key: 'Ac1', name: '交易频率',  group: '行动模型' },
  { key: 'Ac2', name: '决策风格',  group: '行动模型' },
  { key: 'Ac3', name: '持仓定力',  group: '行动模型' },
  { key: 'C1', name: '市场观倾向', group: '认知模型' },
  { key: 'C2', name: '独立思考度', group: '认知模型' },
  { key: 'C3', name: '归因模式',   group: '认知模型' },
];

// 每维度2题，共30题 + 1补充题
const QUESTIONS = [
  // R1 风险承受力
  { dim: 'R1', text: '你买入一只股票后，最大的亏损幅度到多少你会开始睡不着觉？', opts: [
    { letter: 'A', text: '亏5%就觉得天塌了', score: 1 },
    { letter: 'B', text: '亏20%还能勉强接受', score: 2 },
    { letter: 'C', text: '腰斩（-50%）只要逻辑没变我照样睡得香', score: 3 },
  ]},
  { dim: 'R1', text: '你的账户如果一整个月都在阴跌，你的日常状态是？', opts: [
    { letter: 'A', text: '频繁打开软件，焦虑得吃不下饭', score: 1 },
    { letter: 'B', text: '有点郁闷，但还能正常生活工作', score: 2 },
    { letter: 'C', text: '该干嘛干嘛，甚至越跌越开心能补仓', score: 3 },
  ]},
  // R2 波动容忍度
  { dim: 'R2', text: '持仓股当天先跌5%再涨5%，最终收平，你的心跳是？', opts: [
    { letter: 'A', text: '坐过山车，心脏病都要犯了', score: 1 },
    { letter: 'B', text: '有点刺激，但还在承受范围内', score: 2 },
    { letter: 'C', text: '毫无波澜，甚至觉得主力在洗盘', score: 3 },
  ]},
  { dim: 'R2', text: '大盘突然因为小道消息暴跌3%，你的第一反应是？', opts: [
    { letter: 'A', text: '赶紧清仓跑路，保命要紧', score: 1 },
    { letter: 'B', text: '减点仓位，观察一下再说', score: 2 },
    { letter: 'C', text: '毫不在意，甚至想看看有没有错杀的好货', score: 3 },
  ]},
  // R3 止损果断度
  { dim: 'R3', text: '买入后发现自己逻辑看错了，但目前还亏得不多，你会？', opts: [
    { letter: 'A', text: '立马割肉，认错出局', score: 1 },
    { letter: 'B', text: '犹豫一下，等反弹一点再走', score: 2 },
    { letter: 'C', text: '死扛到底，不回本绝对不卖', score: 3 },
  ]},
  { dim: 'R3', text: '股价跌破了你的关键止损位（比如20日线），你会？', opts: [
    { letter: 'A', text: '机器般无情按掉止损', score: 1 },
    { letter: 'B', text: '心理斗争半天，最终含泪割掉', score: 2 },
    { letter: 'C', text: '装死不看，假装自己是个价值投资者', score: 3 },
  ]},
  // L1 基本面信仰
  { dim: 'L1', text: '买股票前，你最看重什么？', opts: [
    { letter: 'A', text: '公司的护城河、财报和估值', score: 1 },
    { letter: 'B', text: '行业赛道和未来的想象空间', score: 2 },
    { letter: 'C', text: '谁管基本面，看图炒股就行了', score: 3 },
  ]},
  { dim: 'L1', text: '面对一家年年亏损的公司，你的态度是？', opts: [
    { letter: 'A', text: '一票否决，绝不碰垃圾股', score: 1 },
    { letter: 'B', text: '如果有反转预期，可以小仓位赌一把', score: 2 },
    { letter: 'C', text: '亏损算什么？只要能涨就是好票', score: 3 },
  ]},
  // L2 技术面依赖

  E1: { L: '见好就收，落袋为安', M: '赚了想赚更多，但又怕', H: '涨了加仓，梭哈干' },
  E2: { L: '一跌就慌，赶紧跑', M: '跌了难受，但能忍', H: '越跌越买，逆向加仓' },
  E3: { L: '别人赚了与我无关', M: '有点眼红，控制住', H: '踏空比亏钱还难受' },
  Ac1: { L: '日内做T，快进快出', M: '波段操作，适度换手', H: '长期持有，不动如山' },
  Ac2: { L: '看对眼就买，干脆利落', M: '想一想再决定', H: '反复研究，犹豫不决' },
  Ac3: { L: '三天不涨就换股', M: '能等个半年再说', H: '死拿到底，逻辑不变不走' },
  C1: { L: '赌场论者，零和博弈', M: '市场有风险也有价值', H: '价值创造，长期向上' },
  C2: { L: '独立思考，逆向而行', M: '参考他人，自己做主', H: '盲从大V，随波逐流' },
  C3: { L: '盈亏归己，反思迭代', M: '半靠自己半靠命', H: '赚钱靠运气，亏钱怪庄家' },
};

// ===== 核心逻辑 =====
let currentQ = 0;
let scores = {}; // { R1: 0, R2: 0, ... }
let isDrunk = false;
let isBonusPhase = false;
let bonusStep = 0;
let shuffledQuestions = []; // 随机排序后的题目

// 初始化分数
DIMENSIONS.forEach(d => { scores[d.key] = 0; });

// 分数转等级
function sumToLevel(score) {
  if (score <= 3) return 'L';
  if (score === 4) return 'M';
  return 'H';
}

// 显示页面
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// Fisher-Yates 洗牌算法
function shuffleArray(array) {
  const shuffled = [...array];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
}

// 开始测试
function startQuiz() {
  currentQ = 0;
  isDrunk = false;
  isBonusPhase = false;
  bonusStep = 0;
  DIMENSIONS.forEach(d => { scores[d.key] = 0; });
  shuffledQuestions = shuffleArray(QUESTIONS); // 随机排序题目
  showPage('quizPage');
  renderQuestion();
}

// 渲染题目
function renderQuestion() {
  const card = document.getElementById('questionCard');
  const q = shuffledQuestions[currentQ];
  const dim = DIMENSIONS.find(d => d.key === q.dim);

  // 更新进度
  document.getElementById('qCurrent').textContent = currentQ + 1;
  document.getElementById('qTotal').textContent = QUESTIONS.length;
  document.getElementById('progressFill').style.width = ((currentQ + 1) / QUESTIONS.length * 100) + '%';
  document.getElementById('dimLabel').textContent = dim.group;

  // 直接更新内容，无动画
  document.getElementById('qText').textContent = q.text;
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';

  q.opts.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.setAttribute('aria-label', '选项' + opt.letter);
    btn.innerHTML = `<span class="opt-letter">${opt.letter}</span><span>${opt.text}</span>`;
    btn.addEventListener('click', () => selectOption(opt.score, btn));
    container.appendChild(btn);
  });
}

// 选择选项
function selectOption(score, btnEl) {
  // 防止重复点击
  if (btnEl.classList.contains('selected')) return;
  document.querySelectorAll('.option-btn').forEach(b => {
    b.style.pointerEvents = 'none';
  });
  btnEl.classList.add('selected');

  const q = shuffledQuestions[currentQ];
  scores[q.dim] += score;

  // 延迟后进入下一题
  setTimeout(() => {
    currentQ++;
    if (currentQ < QUESTIONS.length) {
      renderQuestion();
    } else {
      // 30题答完，进入补充题
      isBonusPhase = true;
      bonusStep = 1;
      renderBonusQuestion();
    }
  }, 200);
}

// 渲染补充题
function renderBonusQuestion() {
  const qData = bonusStep === 1 ? BONUS_Q1 : BONUS_Q2;

  document.getElementById('qCurrent').textContent = '31';
  document.getElementById('qTotal').textContent = '31';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('dimLabel').textContent = '隐藏触发题';

  document.getElementById('qText').textContent = qData.text;
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';

  qData.opts.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.setAttribute('aria-label', '选项' + opt.letter);
    btn.innerHTML = `<span class="opt-letter">${opt.letter}</span><span>${opt.text}</span>`;
    btn.addEventListener('click', () => selectBonusOption(opt, btn));
    container.appendChild(btn);
  });
}

// 选择补充题选项
function selectBonusOption(opt, btnEl) {
  if (btnEl.classList.contains('selected')) return;
  document.querySelectorAll('.option-btn').forEach(b => {
    b.style.pointerEvents = 'none';
  });
  btnEl.classList.add('selected');

  if (opt.next === 'drunk') {
    isDrunk = true;
    setTimeout(() => showResult(), 200);
  } else if (opt.next === 'bonus2') {
    bonusStep = 2;
    setTimeout(() => renderBonusQuestion(), 200);
  } else {
    setTimeout(() => showResult(), 200);
  }
}

// 显示结果
function showResult() {
  showPage('resultPage');

  let resultCode, resultName, resultDesc, resultTraits, matchPct;

  if (isDrunk) {
    // 触发杠杆狂
    resultCode = DRUNK_PERSONALITY.code;
    resultName = DRUNK_PERSONALITY.name;
    resultDesc = DRUNK_PERSONALITY.desc;
    resultTraits = DRUNK_PERSONALITY.traits;
    matchPct = 100;
  } else {
    // 计算用户向量
    const userLevels = DIMENSIONS.map(d => sumToLevel(scores[d.key]));
    const userVec = userLevels.map(l => l === 'L' ? 1 : l === 'M' ? 2 : 3);

    // 匹配
    let bestDist = Infinity;
    let bestP = null;

    PERSONALITIES.forEach(p => {
      const pLevels = p.pattern.split('');
      const pVec = pLevels.map(l => l === 'L' ? 1 : l === 'M' ? 2 : 3);
      let dist = 0;
      for (let i = 0; i < 15; i++) {
        dist += Math.abs(userVec[i] - pVec[i]);
      }
      if (dist < bestDist) {
        bestDist = dist;
        bestP = p;
      }
    });

    matchPct = Math.max(0, Math.round((1 - bestDist / 30) * 100));

    if (matchPct < 60) {
      // 兜底人格
      resultCode = FALLBACK_PERSONALITY.code;
      resultName = FALLBACK_PERSONALITY.name;
      resultDesc = FALLBACK_PERSONALITY.desc;
      resultTraits = FALLBACK_PERSONALITY.traits;
    } else {
      resultCode = bestP.code;
      resultName = bestP.name;
      resultDesc = bestP.desc;
      resultTraits = bestP.traits;
    }
  }

  // 渲染结果
  document.getElementById('resCode').textContent = resultCode;
  document.getElementById('resName').textContent = resultName;
  document.getElementById('resMatch').textContent = matchPct;
  document.getElementById('resDesc').textContent = resultDesc;

  // 渲染特征标签
  const traitsContainer = document.getElementById('resTraits');
  traitsContainer.innerHTML = '';
  resultTraits.forEach(t => {
    const tag = document.createElement('span');
    tag.className = 'trait-tag';
    tag.textContent = t;
    traitsContainer.appendChild(tag);
  });

  // 渲染维度图
  renderDimBars();
}

// 渲染维度条形图
function renderDimBars() {
  const container = document.getElementById('dimBars');
  container.innerHTML = '';

  let currentGroup = '';
  DIMENSIONS.forEach((d, i) => {
    if (d.group !== currentGroup) {
      currentGroup = d.group;
      const groupTitle = document.createElement('div');
      groupTitle.className = 'dim-group-title';
      groupTitle.textContent = currentGroup;
      container.appendChild(groupTitle);
    }

    const level = sumToLevel(scores[d.key]);
    const desc = DIM_DESCS[d.key][level];

    const row = document.createElement('div');
    row.className = 'dim-row';
    row.innerHTML = `
      <span class="dim-label" title="${desc}">${d.name}</span>
      <div class="dim-bar-bg"><div class="dim-bar-fill ${level}" style="width:${level === 'L' ? '33.3' : level === 'M' ? '66.6' : '100'}%"></div></div>
      <span class="dim-level ${level}">${level}</span>
    `;
    container.appendChild(row);
  });
}

// 重新测试
function restartQuiz() {
  DIMENSIONS.forEach(d => { scores[d.key] = 0; });
  currentQ = 0;
  isDrunk = false;
  isBonusPhase = false;
  bonusStep = 0;
  showPage('startPage');
}

// Toast 提示
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// 键盘支持：1/A, 2/B, 3/C 快捷选择
document.addEventListener('keydown', (e) => {
  const quizPage = document.getElementById('quizPage');
  if (!quizPage.classList.contains('active')) return;

  const keyMap = { '1': 0, '2': 1, '3': 2, 'a': 0, 'b': 1, 'c': 2, 'A': 0, 'B': 1, 'C': 2 };
  const idx = keyMap[e.key];
  if (idx !== undefined) {
    const btns = document.querySelectorAll('.option-btn');
    if (btns[idx] && !btns[idx].classList.contains('selected')) {
      btns[idx].click();
    }
  }
});
</script>
